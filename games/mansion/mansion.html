<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Billion Dollar Mansion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a3a2a, #0d2818, #1a4a30);
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            text-decoration: none;
            border-radius: 5px;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            border: 1px solid rgba(46, 204, 113, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }

        #back-button:hover {
            background: rgba(46, 204, 113, 0.4);
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.6);
        }
    </style>
</head>
<body>
    <a href="../../index.html" id="back-button">&#8592; Back to Games</a>
    <script src="mansion.js"></script>
</body>
</html>
